<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxcall Playground</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  padding: 2rem;
}
h1 { text-align: center; margin-bottom: 1.5rem; color: #ff9f43; }
.container {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.panel {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 8px;
  padding: 1.5rem;
}
.panel h2 {
  margin-bottom: 1rem;
  color: #e94560;
  font-size: 1.1rem;
}
label {
  display: block;
  margin-bottom: 0.3rem;
  font-size: 0.85rem;
  color: #aaa;
}
label + label { margin-top: 0.8rem; }
textarea {
  width: 100%;
  font-family: "Menlo", "Consolas", monospace;
  font-size: 0.9rem;
  background: #0a0a1a;
  color: #e0e0e0;
  border: 1px solid #333;
  border-radius: 4px;
  padding: 0.5rem;
  resize: vertical;
}
textarea:focus { outline: none; border-color: #e94560; }
.btn-row { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
button {
  padding: 0.5rem 1.2rem;
  border: none;
  border-radius: 4px;
  font-size: 0.9rem;
  cursor: pointer;
  font-weight: 600;
}
button:disabled { opacity: 0.5; cursor: not-allowed; }
button:active:not(:disabled) { transform: scale(0.97); }
.btn-primary { background: #e94560; color: #fff; }
.btn-secondary { background: #0f3460; color: #e0e0e0; }
.output-box {
  margin-top: 0.8rem;
  background: #0a0a1a;
  border: 1px solid #333;
  border-radius: 4px;
  padding: 0.5rem;
  font-family: "Menlo", "Consolas", monospace;
  font-size: 0.9rem;
  min-height: 2rem;
  white-space: pre-wrap;
  word-break: break-all;
}
.output-box.error { border-color: #e94560; color: #ff6b6b; }
.status {
  font-size: 0.8rem;
  color: #888;
  margin-top: 0.4rem;
}
</style>
</head>
<body>

<h1>Foxcall Playground</h1>
<div class="container">

  <!-- BF → Foxcall converter -->
  <div class="panel">
    <h2>BF → Foxcall Converter</h2>
    <label for="bf-input">Brainfuck code</label>
    <textarea id="bf-input" rows="3" placeholder="e.g. +++++++++[>+++++++++<-]>++."></textarea>
    <div class="btn-row">
      <button class="btn-primary" id="btn-convert" disabled>Convert</button>
      <button class="btn-secondary" id="btn-copy">Copy to Runner</button>
    </div>
    <label>Result</label>
    <div class="output-box" id="convert-result"></div>
  </div>

  <!-- Foxcall runner -->
  <div class="panel">
    <h2>Foxcall Runner</h2>
    <label for="fox-input">Foxcall code</label>
    <textarea id="fox-input" rows="4" placeholder="ルルルールビー..."></textarea>
    <label for="stdin-input">Stdin</label>
    <textarea id="stdin-input" rows="2" placeholder="(optional)"></textarea>
    <div class="btn-row">
      <button class="btn-primary" id="btn-run" disabled>Run</button>
    </div>
    <label>stdout</label>
    <div class="output-box" id="stdout"></div>
    <label>stderr</label>
    <div class="output-box error" id="stderr"></div>
    <div class="status" id="status">Loading WASM...</div>
  </div>

</div>

<script type="module">
import init, { execute, translate_bf_into_foxcall } from './pkg/foxcall.js';

const $ = id => document.getElementById(id);

$('btn-convert').addEventListener('click', () => {
  const bf = $('bf-input').value;
  if (!bf) return;
  try {
    $('convert-result').textContent = translate_bf_into_foxcall(bf);
  } catch (e) {
    $('convert-result').textContent = 'Error: ' + e.message;
  }
});

$('btn-copy').addEventListener('click', () => {
  const t = $('convert-result').textContent;
  if (t && !t.startsWith('Error:')) $('fox-input').value = t;
});

$('btn-run').addEventListener('click', () => {
  $('stdout').textContent = '';
  $('stderr').textContent = '';
  $('status').textContent = 'Running...';
  const code = $('fox-input').value;
  if (!code) { $('status').textContent = ''; return; }
  try {
    $('stdout').textContent = execute(code, $('stdin-input').value);
    $('status').textContent = 'Done.';
  } catch (e) {
    $('stderr').textContent = e.message;
    $('status').textContent = 'Error';
  }
});

await init();
$('btn-convert').disabled = false;
$('btn-run').disabled = false;
$('status').textContent = 'WASM loaded.';
</script>
</body>
</html>
